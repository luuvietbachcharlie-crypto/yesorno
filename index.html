<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For u 💖</title>

<style>

body{

    margin:0;
    padding:0;

    overflow:hidden;

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:#ffd6e7;

    font-family:Arial, sans-serif;
}

/* tim nền */

.heart{

    position:absolute;

    color:#ff4f8b;

    opacity:0.6;

    animation:float linear infinite;
}

@keyframes float{

    0%{

        transform:translateY(100vh);

        opacity:0;
    }

    20%{

        opacity:0.6;
    }

    100%{

        transform:translateY(-120px);

        opacity:0;
    }
}

/* box */

.container{

    position:relative;

    z-index:10;

    width:360px;

    padding:30px;

    background:white;

    border-radius:25px;

    text-align:center;

    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

img{

    width:180px;

    border-radius:20px;
}

h1{

    color:#ff4f8b;

    font-size:28px;

    margin-top:20px;
}

/* button */

button{

    width:100%;

    padding:15px;

    margin-top:15px;

    border:none;

    border-radius:15px;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

    transition:0.2s;
}

button:hover{

    transform:scale(1.05);
}

.yes{

    background:#ff5c93;

    color:white;
}

.no{

    background:#d9d9d9;
}

.row{

    display:flex;

    gap:10px;
}

.row button{

    width:50%;
}

#sadText{

    margin-top:20px;

    font-size:30px;
}

</style>

</head>

<body>

<script>

/* tạo tim nền */

for(let i=0;i<40;i++){

    let heart=document.createElement("div");

    heart.className="heart";

    heart.innerHTML="💖";

    heart.style.left=Math.random()*100+"vw";

    heart.style.fontSize=(Math.random()*25+15)+"px";

    heart.style.animationDuration=(Math.random()*4+4)+"s";

    document.body.appendChild(heart);
}

</script>

<!-- PAGE 1 -->

<div class="container" id="page1">

    <img src="image.png">

    <h1>

        Bà thấy buổi đi chơi vừa rồi như thế lào?

    </h1>

    <button class="yes" onclick="openSecondPage()">

        Có tui thích lắm 💖

    </button>

    <button class="no" onclick="showSad()">

        Cũm được 😐

    </button>

    <div id="sadText"></div>

</div>

<!-- PAGE 2 -->

<div class="container" id="page2" style="display:none;">

    <img src="heart.png">

    <h1>

        Lần sau đi típ nhe 💕

    </h1>

    <div class="row">

        <button class="yes" onclick="finalYes()">

            YES

        </button>

        <button class="no" onclick="openTrapPage()">

            NO

        </button>

    </div>

</div>

<!-- PAGE 3 -->

<div class="container" id="page3" style="display:none;">

    <img src="apex.png">

    <h1>

        Danke, tui thít lắm 💖

    </h1>

</div>

<!-- PAGE 4 -->

<div class="container" id="page4" style="display:none;">

    <h1>

        Chọn lại đi 😭

    </h1>

    <button class="yes" onclick="finalYes()">

        YES

    </button>

    <button class="yes" onclick="finalYes()">

        Phải yesssss, yesssss đi mofooooooooo 💀

    </button>

</div>

<script>

/* DISCORD WEBHOOK */

const webhookURL = "https://discord.com/api/webhooks/1506693795431841943/deVw-3C-QxLXq3Y5Z_gZyzI4Mr7Qv72gcG9ireGla8gYUdDf0p9wQiNeDA4T_F2s0YTK";

/* gửi discord */

function sendDiscordMessage(message){

    fetch(webhookURL, {

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({

            content:message

        })

    });
}

/* bấm cũm được */

function showSad(){

    sendDiscordMessage("😐 Có người bấm 'Cũm được'");

    document.getElementById("sadText").innerHTML="😢";
}

/* mở page 2 */

function openSecondPage(){

    sendDiscordMessage("💖 Có người bấm 'Có tui thích lắm'");

    document.getElementById("page1").style.display="none";

    document.getElementById("page2").style.display="block";
}

/* yes cuối */

function finalYes(){

    sendDiscordMessage("💍 Người ấy chọn YES");

    document.getElementById("page2").style.display="none";

    document.getElementById("page4").style.display="none";

    document.getElementById("page3").style.display="block";
}

/* no */

function openTrapPage(){

    sendDiscordMessage("😭 Người ấy chọn NO");

    document.getElementById("page2").style.display="none";

    document.getElementById("page4").style.display="block";
}

</script>

</body>

</html>
